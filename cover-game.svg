<svg xmlns="http://www.w3.org/2000/svg" width="630" height="500" viewBox="0 0 630 500" role="img" aria-label="Cover Pilah Sampah">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1b3a"/>
      <stop offset="1" stop-color="#041022"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13233f"/>
      <stop offset="1" stop-color="#0b172c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="630" height="500" fill="url(#bg)"/>
  <circle cx="80" cy="50" r="120" fill="#22c55e" opacity="0.1"/>
  <circle cx="560" cy="430" r="140" fill="#38bdf8" opacity="0.08"/>

  <rect x="24" y="24" width="170" height="38" rx="16" fill="#22c55e"/>
  <text x="41" y="50" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#042f1a">♻ Game Edukasi</text>

  <text x="24" y="150" font-family="Arial,sans-serif" font-size="60" font-weight="900" fill="#f8fafc">PILAH</text>
  <text x="24" y="220" font-family="Arial,sans-serif" font-size="60" font-weight="900" fill="#f8fafc">SAMPAH</text>
  <text x="24" y="270" font-family="Arial,sans-serif" font-size="31" font-weight="700" fill="#cbd5e1">Misi Bumi Bersih</text>
  <text x="24" y="307" font-family="Arial,sans-serif" font-size="15" fill="#94a3b8">Tangkap dan pilah sampah dengan benar</text>

  <g filter="url(#shadow)">
    <rect x="340" y="86" width="266" height="348" rx="26" fill="url(#card)" stroke="#334155"/>

    <rect x="365" y="116" width="95" height="95" rx="16" fill="#22c55e"/>
    <rect x="485" y="116" width="95" height="95" rx="16" fill="#38bdf8"/>
    <rect x="365" y="231" width="95" height="95" rx="16" fill="#facc15"/>
    <rect x="485" y="231" width="95" height="95" rx="16" fill="#ef4444"/>

    <text x="398" y="177" font-size="44">🍌</text>
    <text x="518" y="177" font-size="44">🧴</text>
    <text x="398" y="292" font-size="44">📄</text>
    <text x="518" y="292" font-size="44">🔋</text>

    <text x="371" y="365" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">Organik • Plastik • Kertas • B3</text>
  </g>

